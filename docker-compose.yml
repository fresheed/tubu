services:
  server:
    build: ./server
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/dash/manifest.mpd')"]
      interval: 2s
      timeout: 2s
      retries: 15

  downloader:
    build:
      context: .
      dockerfile: Dockerfile.downloader
    working_dir: /app
    volumes:
      - .:/app
      - cargo-registry:/usr/local/cargo/registry
      - target-cache:/app/target
    network_mode: "service:server"
    depends_on:
      server:
        condition: service_healthy

volumes:
  cargo-registry:
  target-cache:
